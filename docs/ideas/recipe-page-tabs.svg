<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <!--
    Design mockup for the recipe page tab split.
    Colors mirror examples/recipe-book/index.tokens.css so this preview
    matches the example app's palette.
      bg:           #faf7f2
      primary:      #b94040
      text:         #2c1810
      text-muted:   #7a6359
      border:       #e8ddd5
  -->

  <!-- Page background -->
  <rect width="800" height="900" fill="#faf7f2"/>

  <!-- Content column (max-width simulation) -->
  <g transform="translate(80, 56)">

    <!-- Back link -->
    <text x="0" y="18" font-size="15" fill="#b94040">← Back to desserts</text>

    <!-- Title -->
    <text x="0" y="72" font-size="32" font-weight="700" fill="#2c1810">Chocolate Lava Cake</text>

    <!-- Meta badges -->
    <g transform="translate(0, 96)" font-size="13" fill="#7a6359">
      <g>
        <rect x="0"   y="0" width="78"  height="28" rx="14" fill="#faf7f2" stroke="#e8ddd5"/>
        <text x="39"  y="18" text-anchor="middle">desserts</text>
      </g>
      <g>
        <rect x="88"  y="0" width="92"  height="28" rx="14" fill="#faf7f2" stroke="#e8ddd5"/>
        <text x="134" y="18" text-anchor="middle">2 servings</text>
      </g>
      <g>
        <rect x="190" y="0" width="86"  height="28" rx="14" fill="#faf7f2" stroke="#e8ddd5"/>
        <text x="233" y="18" text-anchor="middle">Prep 10 min</text>
      </g>
      <g>
        <rect x="286" y="0" width="90"  height="28" rx="14" fill="#faf7f2" stroke="#e8ddd5"/>
        <text x="331" y="18" text-anchor="middle">Cook 12 min</text>
      </g>
      <g>
        <rect x="386" y="0" width="52"  height="28" rx="14" fill="#faf7f2" stroke="#e8ddd5"/>
        <text x="412" y="18" text-anchor="middle">easy</text>
      </g>
    </g>

    <!-- Tablist -->
    <g transform="translate(0, 168)">
      <!-- Bottom border of the tablist -->
      <line x1="0" y1="44" x2="640" y2="44" stroke="#e8ddd5" stroke-width="1"/>

      <!-- Ingredients tab (active) -->
      <g>
        <text x="16" y="28" font-size="15" font-weight="600" fill="#b94040">Ingredients</text>
        <!-- Active underline overlaps the tablist border -->
        <line x1="0" y1="44" x2="115" y2="44" stroke="#b94040" stroke-width="2"/>
      </g>

      <!-- Instructions tab (inactive) -->
      <g>
        <text x="131" y="28" font-size="15" font-weight="500" fill="#7a6359">Instructions</text>
      </g>
    </g>

    <!-- Active panel: Ingredients -->
    <g transform="translate(0, 236)" font-size="15" fill="#2c1810">
      <text x="0" y="0"   >•  100 g dark chocolate (70%), chopped</text>
      <text x="0" y="28"  >•  100 g unsalted butter, plus extra for the ramekins</text>
      <text x="0" y="56"  >•  2 large eggs</text>
      <text x="0" y="84"  >•  2 large egg yolks</text>
      <text x="0" y="112" >•  50 g caster sugar</text>
      <text x="0" y="140" >•  2 tbsp plain flour</text>
      <text x="0" y="168" >•  a pinch of fine sea salt</text>
      <text x="0" y="196" >•  icing sugar, to serve</text>
    </g>

    <!-- Annotations -->
    <g font-size="12" fill="#7a6359" font-style="italic">
      <text x="0" y="500">Clicking “Instructions” swaps the panel below the tablist.</text>
      <text x="0" y="518">Header, badges and back link stay fixed above the tabs.</text>
      <text x="0" y="536">Active tab underlines in --color-primary; inactive tab uses --color-text-muted.</text>
    </g>

    <!-- Second state preview: Instructions tab active -->
    <g transform="translate(0, 576)">
      <text x="0" y="0" font-size="13" font-weight="600" fill="#7a6359" letter-spacing="0.6">STATE 2 — INSTRUCTIONS TAB ACTIVE</text>

      <!-- Tablist -->
      <g transform="translate(0, 24)">
        <line x1="0" y1="44" x2="640" y2="44" stroke="#e8ddd5" stroke-width="1"/>

        <!-- Ingredients tab (inactive) -->
        <g>
          <text x="16" y="28" font-size="15" font-weight="500" fill="#7a6359">Ingredients</text>
        </g>

        <!-- Instructions tab (active) -->
        <g>
          <text x="131" y="28" font-size="15" font-weight="600" fill="#b94040">Instructions</text>
          <line x1="115" y1="44" x2="238" y2="44" stroke="#b94040" stroke-width="2"/>
        </g>
      </g>

      <!-- Active panel: Instructions -->
      <g transform="translate(0, 92)" font-size="15" fill="#2c1810">
        <text x="0" y="0"   >1.  Heat the oven to 200°C. Butter and flour two ramekins.</text>
        <text x="0" y="28"  >2.  Melt the chocolate and butter together over a bain-marie.</text>
        <text x="0" y="56"  >3.  Whisk eggs, yolks and sugar until pale and thick.</text>
        <text x="0" y="84"  >4.  Fold the chocolate mix into the eggs, then sift in the flour.</text>
        <text x="0" y="112" >5.  Divide between the ramekins and bake for 10–12 minutes.</text>
      </g>
    </g>
  </g>
</svg>
