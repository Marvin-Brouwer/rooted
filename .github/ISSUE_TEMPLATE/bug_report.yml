name: Bug report
description: Create a report to help us improve
labels: [bug]
body:
  - type: input
    id: package-version
    attributes:
      label: Package + Version
      description: NuGet package name and version, or a link to the version on nuget.org.
      placeholder: e.g. Rooted.DependencyInjection 1.2.3
    validations:
      required: true

  - type: input
    id: framework-version
    attributes:
      label: Framework version
      description: The framework version(s) to which this bug applies.
      placeholder: e.g. .NET 8.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
