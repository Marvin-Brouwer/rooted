name: Bug report
description: Create a report to help us improve
labels: [bug]
body:
  - type: input
    id: package-version
    attributes:
      label: Package + Version
      description: npm package name and version, or a link to the version on npmjs.com.
      placeholder: e.g. @rooted/components 1.2.3
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node version and browser (if a runtime bug).
      placeholder: e.g. Node 22.4.0 / Chrome 124
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
