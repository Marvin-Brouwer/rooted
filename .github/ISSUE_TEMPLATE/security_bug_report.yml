name: Security bug report
description: Report a security vulnerability
labels: [bug, security]
body:
  - type: input
    id: package-version
    attributes:
      label: Package + Version
      description: NuGet package name and version, or a link to the version on nuget.org.
      placeholder: e.g. Rooted.DependencyInjection 1.2.3
    validations:
      required: true

  - type: input
    id: framework-version
    attributes:
      label: Framework version
      description: The framework version(s) to which this vulnerability applies.
      placeholder: e.g. .NET 8.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the vulnerability
      description: A clear and concise description of what the vulnerability is. Include any links to CVEs or blogs explaining the issue.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
