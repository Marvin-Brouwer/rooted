name: Security bug report
description: Report a security vulnerability — please use the private advisory flow instead
labels: [bug, security]
body:
  - type: markdown
    attributes:
      value: |
        > [!WARNING]
        > **Please do not report security vulnerabilities publicly.**
        > Use the [private security advisory](https://github.com/Marvin-Brouwer/rooted/security/advisories/new)
        > so the issue can be assessed and patched before public disclosure.

  - type: input
    id: package-version
    attributes:
      label: Package + Version
      description: npm package name and version, or a link to the version on npmjs.com.
      placeholder: e.g. @rooted/components 1.2.3
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node version and browser (if a runtime bug).
      placeholder: e.g. Node 22.4.0 / Chrome 124
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the vulnerability
      description: A clear and concise description of what the vulnerability is. Include any links to CVEs or blogs explaining the issue.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
