name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write # required for npm provenance

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Pre-fetch git notes synchronously. semantic-release@25 stores per-tag
      # channel metadata in refs/notes/semantic-release-<tag>. multi-semantic-release
      # fans out semantic-release across every package concurrently, and each one
      # calls fetchNotes (+refs/notes/*:refs/notes/* with reject: false). Those
      # parallel fetches race on the local refs database and leave one notes ref
      # pointing at a missing object, which then fails getTagsNotes for any
      # package that runs after. Doing the fetch once up front avoids the race.
      - name: Fetch git notes
        run: git fetch origin '+refs/notes/*:refs/notes/*'

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build:ci

      # Switch to Node 24 for the release step. rolldown v1.0.0 corrupts
      # is-core-module/core.json via pnpm hard links on Node 24, so the
      # build runs on Node 22. npm v11 (bundled with Node 24) has working
      # OIDC Trusted Publisher support; npm v10 (Node 22) does not.
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Release
        run: pnpm release
        env:
          # This is necessary for semantic release
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
