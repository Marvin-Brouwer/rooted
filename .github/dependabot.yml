version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      eslint:
        patterns:
          - "@eslint/*"
          - "eslint*"
          - "typescript-eslint"
          - "@typescript-eslint/*"
      testing:
        patterns:
          - vitest
      typescript:
        patterns:
          - typescript
          - tsup
      pipeline:
        patterns:
          - husky
          - "@commitlint/*"
          - multi-semantic-release
          - "@semantic-release/*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
